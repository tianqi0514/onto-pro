<text x="74" y="555" font-size="21" font-weight="600" fill="#8A6500" text-anchor="start" font-family="PingFang SC, Microsoft YaHei, Arial">治理闭环：本体版本、Skill 版本、证据源、人工反馈、回归评测、权限审计必须同时记录。</text>
<text x="74" y="582" font-size="17" font-weight="400" fill="#5C6670" text-anchor="start" font-family="PingFang SC, Microsoft YaHei, Arial">核心不是“自动回答”，而是让每一次回答都能被追溯、被评分、被修正。</text>
