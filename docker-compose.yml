services:
  postgres:
    image: postgres:16
    container_name: onto-pro-postgres
    environment:
      POSTGRES_USER: onto
      POSTGRES_PASSWORD: onto
      POSTGRES_DB: onto_pro
    ports:
      - "5434:5432"
    volumes:
      - onto_pro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onto -d onto_pro"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  onto_pro_pgdata:
